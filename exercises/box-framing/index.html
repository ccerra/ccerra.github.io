<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Picture Frames</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <h1>Welcome to the Gallery!</h1>

        <div id="gallery">
            <div class="frame frame1">
                <img
                    class="art"
                    src="images/ocean-frame1.png"
                    alt="Ocean"
                >
                <img
                    class="border"
                    src="images/frame-1.png"
                    alt="Frame"
                >
            </div>

            <div class="frame frame2">
                <img
                    class="art"
                    src="images/ocean-frame3.jpg"
                    alt="Ocean"
                >
                <img
                    class="border"
                    src="images/FRAME-3.png"
                    alt="Frame"
                >
            </div>

            <div class="frame frame3">
                <img
                    class="art"
                    src="images/ocean-frame2.jpg"
                    alt="Ocean"
                >
                <img
                    class="border"
                    src="images/frame-2.png"
                    alt="Frame"
                >
            </div>
        </div>
    </body>
</html>
