<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MEBAY</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <div id="navbar">
            <a href="#" class="logo">Mebay</a>
            <a href="#" class="categories">Categories</a>
            <a href="#">Deals</a>
            <a href="#">Sell</a>

            <div class="icons">
                <a href="#"><img src="images/acct.svg" alt="Account"></a>
                <a href="#"><img src="images/cart.svg" alt="Cart"></a>
            </div>
        </div>

        <div id="layout">
            <div id="thumbnail-column">
                <img src="images/MEBAY-1.webp" alt="Thumbnail 1">
                <img src="images/MEBAY-2.webp" alt="Thumbnail 2">
                <img src="images/MEBAY-2.1.webp" alt="Thumbnail 3">
                <img src="images/MEBAY-3.webp" alt="Thumbnail 4">
                <img src="images/MEBAY-4.webp" alt="Thumbnail 5">
            </div>

            <div id="featured-image-column">
                <img src="images/MEBAY-1.webp" alt="Korok Plush">
            </div>

            <div id="product-info-column">
                <h1>DIMOO-WORLD-×-Honor-of-Kings-10th-Anniversary</h1>

                <div id="seller-info">
                    <a href="#">Limited-Figurine</a>

                    <p>
                        <a href="#">100% Positive</a>
                        <a href="#">Seller's other items</a>
                        <a href="#">Contact seller</a>
                    </p>
                </div>

                <h2>$142.99</h2>

                <p><strong>Condition:</strong> New</p>

                <a href="#" class="button">Buy It Now</a>
                <a href="#" class="button">Add to Cart</a>
                <a href="#" class="button">Add to Wishlist</a>
            </div>
        </div>
    </body>
</html>
