<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bulletin Board (Exercise)</title>
        <link href="css/setup.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet" data-meal-prep>
    </head>
    <body>
        <div id="bulletin-board">
            <!-- ADD YOUR HTML CODE INSIDE OF THIS DIV -->
            <div class="post-it-a">
                <h2>Welcome to my board!!</h2>
                <p>
                    I'm Claudia. I love graphic design, illustration,
                    and creativity. I enjoy drawing, learning new things, 
                    and spending time with my cat. My goal is to become a 
                    professional designer.
                </p>
            </div>
            <div class="post-it-b">
                <h2 id="h1">To Be Read :</h2>
                <ul>
                    <li>An Offer from a Gentleman</li>
                    <li>The Duke and I</li>
                    <li>Romancing Mister Bridgerton</li>
                </ul>
            </div>
            <div class="post-it-c">
                <img src="images/bridg 1.jpg" alt="bridg">
            </div>
            <div class="post-it-d">
                <img src="images/bridg 2.png" alt="bridg">
            </div>
        </div>
    </body>
</html>
