<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Styling containers demo</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <div class="shadow">
            <p id="p1">This is a paragraph</p>
            <p>This is also a paragraph</p>
        </div>
        <div class="shadow">
            <h2>Heading</h2>
            <p>Wow, yet another paragraph over yonder!</p>
        </div>
        <div class="border">
            <h2>Another Heading!</h2>
            <p>Okay, Last paragraph</p>
        </div>
    </body>
</html>
